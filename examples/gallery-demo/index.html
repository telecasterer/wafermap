<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wafermap — Lot Gallery</title>
  <script type="importmap">
    {
      "imports": {
        "wafermap": "../../dist/index.js",
        "wafermap/canvas-adapter": "../../dist/packages/canvas-adapter/index.js"
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #e8e8e8;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px;
    }

    h1 { font-size: 1rem; font-weight: 600; color: #444; letter-spacing: .02em; }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 8px 12px;
      width: min(960px, 96vw);
      font-size: 12px;
    }

    #controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #555;
    }

    #controls select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #fafafa;
    }

    #gallery { width: min(960px, 96vw); }
  </style>
</head>
<body>

<h1>Lot Gallery — FMTDEMO (W01–W04) · Format tester</h1>

<div id="controls"></div>
<div id="gallery"></div>

<script type="module" src="main.js"></script>
</body>
</html>
