<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wafermap — demo</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script type="importmap">{ "imports": { "wafermap": "../../dist/index.js" } }</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f2f5;
      --surface:    #ffffff;
      --border:     #e2e5ea;
      --accent:     #2563eb;
      --accent-dim: #dbeafe;
      --text:       #1a1d23;
      --muted:      #6b7280;
      --radius:     10px;
      --panel-w:    192px;
      --header-h:   52px;
      --toolbar-h:  48px;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      background: #0f1623;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 18px;
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.01em;
      color: #f1f5f9;
    }
    .wordmark span { color: #60a5fa; }

    .header-divider {
      width: 1px; height: 20px;
      background: #2d3748;
    }

    .header-tag {
      font-size: 11px;
      color: #64748b;
    }

    .header-tag strong {
      font-weight: 500;
      color: #94a3b8;
    }

    #wafer-selector {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .wafer-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    #sel-wafer {
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid #2d3748;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 12px;
      cursor: pointer;
    }
    #sel-wafer:focus { outline: none; border-color: var(--accent); }

    #header .spacer { flex: 1; }

    .header-badge {
      font-size: 11px;
      color: #475569;
      padding: 3px 8px;
      border: 1px solid #1e293b;
      border-radius: 5px;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    #toolbar {
      height: var(--toolbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 14px;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 12px;
      border-right: 1px solid var(--border);
      height: 100%;
    }

    .ctrl-group:first-child { padding-left: 0; }
    .ctrl-group:last-child  { border-right: none; }

    .ctrl-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      white-space: nowrap;
    }

    select {
      padding: 4px 7px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      background: #fafbfc;
      color: var(--text);
      cursor: pointer;
    }
    select:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }

    button {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      background: #fafbfc;
      color: var(--text);
      cursor: pointer;
      transition: background .1s, border-color .1s;
      white-space: nowrap;
    }
    button:hover  { background: #f0f1f3; }
    button.active { background: var(--accent-dim); border-color: #93c5fd; color: var(--accent); font-weight: 600; }
    button.icon   { padding: 5px 8px; font-size: 14px; }

    #rot-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      min-width: 30px;
      text-align: center;
    }

    label.toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      user-select: none;
    }
    label.toggle input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

    /* ── Main layout ─────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Chart ───────────────────────────────────────────── */
    #chart-wrap {
      flex: 1;
      padding: 14px;
      min-width: 0;
    }

    #chart {
      width: 100%;
      height: 100%;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    /* ── Side panel ──────────────────────────────────────── */
    #side {
      width: var(--panel-w);
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 12px 10px;
      gap: 12px;
    }

    .panel-section { display: flex; flex-direction: column; gap: 6px; }

    .panel-heading {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }

    .kv-table { width: 100%; border-collapse: collapse; }
    .kv-table td { padding: 2px 0; vertical-align: top; font-size: 12px; }
    .kv-table td:first-child { color: var(--muted); width: 48%; padding-right: 4px; }
    .kv-table td:last-child  { color: var(--text); font-weight: 500; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .stat-cell {
      background: var(--bg);
      border-radius: 7px;
      padding: 7px 6px;
      text-align: center;
    }

    .stat-val {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat-cell.full { grid-column: 1 / -1; }

    .sep { height: 1px; background: var(--border); margin: 0 -10px; }

    .spatial-table { width: 100%; border-collapse: collapse; }
    .spatial-table td {
      padding: 3px 0;
      font-size: 11px;
      vertical-align: middle;
    }
    .spatial-table td:first-child { color: var(--muted); width: 46%; }
    .spatial-table td:last-child  { font-weight: 500; }

    .pct-bar-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .pct-bar {
      flex: 1;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
    }

    .pct-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .3s;
    }

    .pct-num { font-size: 10px; color: var(--muted); width: 32px; text-align: right; }

    /* Bin legend */
    .bin-legend { display: flex; flex-direction: column; gap: 4px; }

    .bin-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .bin-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .bin-name { flex: 1; color: var(--text); }
    .bin-count { color: var(--muted); }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<div id="header">
  <div class="wordmark">wafer<span>map</span></div>
  <div class="header-divider"></div>

  <div id="wafer-selector">
    <span class="wafer-label">Wafer</span>
    <select id="sel-wafer"></select>
  </div>

  <div class="spacer"></div>

  <div class="header-tag"><strong>Manual pipeline</strong> demo · LOT456</div>
</div>

<!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
<div id="toolbar">

  <div class="ctrl-group">
    <span class="ctrl-label">Mode</span>
    <select id="sel-mode">
      <option value="value">Test Value</option>
      <option value="hardbin">Hard Bin</option>
      <option value="softbin">Soft Bin</option>
      <option value="stacked_values">Stacked A/B/C</option>
      <option value="stacked_bins">Stacked Bins</option>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Test</span>
    <select id="sel-channel">
      <option value="0">A</option>
      <option value="1">B</option>
      <option value="2">C</option>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Colour</span>
    <select id="sel-color"></select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Highlight</span>
    <select id="sel-highlight">
      <option value="0">None</option>
      <option value="2">Bin 2</option>
      <option value="3">Bin 3</option>
      <option value="4">Bin 4</option>
      <option value="5">Bin 5</option>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Rotate</span>
    <button class="icon" id="rot-left-btn" title="Rotate −90°">↺</button>
    <span id="rot-badge">0°</span>
    <button class="icon" id="rot-right-btn" title="Rotate +90°">↻</button>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Flip</span>
    <button id="flipx-btn">H</button>
    <button id="flipy-btn">V</button>
  </div>

  <div class="ctrl-group">
    <label class="toggle"><input type="checkbox" id="chk-text"> Labels</label>
    <label class="toggle"><input type="checkbox" id="chk-reticle"> Reticle</label>
    <label class="toggle"><input type="checkbox" id="chk-probe"> Probe</label>
    <label class="toggle"><input type="checkbox" id="chk-rings"> Rings</label>
    <label class="toggle"><input type="checkbox" id="chk-quadrants"> Quadrants</label>
    <label class="toggle"><input type="checkbox" id="chk-xy"> XY</label>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Ring count</span>
    <select id="sel-rings">
      <option value="3">3</option>
      <option value="4" selected>4</option>
      <option value="5">5</option>
      <option value="6">6</option>
    </select>
  </div>

</div>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<div id="main">

  <div id="chart-wrap">
    <div id="chart"></div>
  </div>

  <aside id="side">

    <div class="panel-section">
      <div class="panel-heading">Wafer Info</div>
      <table class="kv-table">
        <tr><td>Lot</td>     <td id="meta-lot">—</td></tr>
        <tr><td>Wafer</td>   <td id="meta-wafer">—</td></tr>
        <tr><td>Date</td>    <td id="meta-date">—</td></tr>
        <tr><td>Program</td> <td id="meta-program">—</td></tr>
        <tr><td>Temp</td>    <td id="meta-temp">—</td></tr>
      </table>
    </div>

    <div class="sep"></div>

    <div class="panel-section">
      <div class="panel-heading">Statistics</div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-val" id="stat-dies">—</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="stat-partial">—</div>
          <div class="stat-lbl">Partial</div>
        </div>
        <div class="stat-cell full">
          <div class="stat-val" id="stat-pass">—</div>
          <div class="stat-lbl">Bin 1 pass rate</div>
        </div>
      </div>
    </div>

    <div class="sep"></div>

    <div class="panel-section">
      <div class="panel-heading">Ring yield</div>
      <table class="spatial-table" id="ring-stats"></table>
    </div>

    <div class="sep"></div>

    <div class="panel-section">
      <div class="panel-heading">Quadrant yield</div>
      <table class="spatial-table" id="quadrant-stats"></table>
    </div>

    <div class="sep"></div>

    <div class="panel-section">
      <div class="panel-heading">Bin legend</div>
      <div class="bin-legend" id="bin-legend"></div>
    </div>

  </aside>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
